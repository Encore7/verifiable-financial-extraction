# Local stack. `make infra-up` starts Postgres only (M0 DoD); `make up` runs the
# full app (postgres + api + worker). The api and worker images are two targets of
# the same multi-stage Dockerfile. The observability stack (prometheus/loki/tempo/
# alloy/grafana) lands in M4.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vfe-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vfe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vfe"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    image: vfe-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vfe
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    image: vfe-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vfe
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
