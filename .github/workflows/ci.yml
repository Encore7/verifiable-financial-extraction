name: CI

on:
  push:
  pull_request:

# Least privilege by default.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync environment (locked)
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync environment (locked)
        run: uv sync --frozen

      - name: Dependency vulnerability scan
        run: uv run pip-audit

      - name: Static security analysis (bandit)
        run: uv run bandit -q -c pyproject.toml -r src

      - name: Secret scan (gitleaks)
        # Filesystem scan of the tree (not a commit-range diff), so it works on
        # any event including the repo's initial push (no firstCommit^ range).
        run: |
          version=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks dir . --redact --no-banner --exit-code 2
